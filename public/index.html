<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <title>TaskManager — Kanban (COMING / ACTIVE / OVERDUE / DONE)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#f5f6fb; --ink:#1f1f1f; --muted:#60646c; --border:#e1e4ec; }
    *{box-sizing:border-box}
    body{ margin:0; width:100%; padding:24px 24px; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--ink); background:var(--bg); }
    header{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
    h1{ font-size:22px; margin:0; }
    .btn{ padding:.45rem .8rem; border:1px solid #999; background:#fff; border-radius:.5rem; cursor:pointer; }
    .btn.danger{ border-color:#c33; }
    .inline{ display:inline-flex; gap:8px; align-items:center; }
    .muted{ color:var(--muted); font-size:.9rem; }

    /* ── Kanban háttér: 4 oszlop, teljes szélességre nyúlik */
    .board{
      display:grid; grid-template-columns: repeat(4, minmax(280px, 1fr));
      gap: clamp(12px, 2vw, 28px);
      min-height: 520px;
      width: 100%;
    }
    .col{
      background: linear-gradient(180deg,#fff, #f7f9ff);
      border:1px solid var(--border); border-radius:12px; overflow:hidden;
      display:flex; flex-direction:column; min-height:420px;
    }
    .col-header{
      padding:10px 12px; font-weight:700; letter-spacing:.5px;
      background:#eef2ff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1;
    }
    .col[data-status="coming"]  .col-header{ color:#0b7285; }
    .col[data-status="active"]  .col-header{ color:#b35c00; }
    .col[data-status="overdue"] .col-header{ color:#a10000; }
    .col[data-status="done"]    .col-header{ color:#2b8a3e; }

    .col-list{
      padding:12px; display:flex; flex-direction:column; gap:12px; flex:1;
      min-height: 360px;
    }
    .col-list.drag-over{ outline:2px dashed rgba(0,0,0,.2); outline-offset:-6px; }

    /* ── Sticky cetli (kártya) */
    .card{
      position:relative; padding:14px 12px 12px;
      border:1.5px solid rgba(0,0,0,.1); border-radius:10px;
      background:#fffbe6; box-shadow: 0 6px 14px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.06);
      transform: rotate(var(--rot,0deg));
      transition: box-shadow .12s ease;
      font-family:"Architects Daughter",cursive;
    }
    .card.dragging{ opacity:.85; box-shadow: 0 12px 26px rgba(0,0,0,.16), 0 6px 12px rgba(0,0,0,.12); }
    .card::before{ content:"📌"; position:absolute; left:14px; top:-10px; font-size:20px; transform:rotate(-12deg); filter: drop-shadow(0 2px 1px rgba(0,0,0,.25)); }
    .note-title{ font-size:18px; font-weight:700; margin:0 28px 6px 0; line-height:1.2; color:#000; } /* nincs piros kiemelés */
    .meta{ display:grid; grid-template-columns:auto 1fr; gap:.35rem .45rem; align-items:baseline; }
    .when{ font-size:.95rem; color:#444; }
    .desc{ font-size:1rem; color:#2a2a2a; display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; }
    .tag{ display:inline-block; margin-top:6px; padding:.1rem .5rem; border:1px dashed rgba(0,0,0,.22); border-radius:999px; font-size:.9rem; color:#222; background:rgba(255,255,255,.5) }
    .actions{ position:absolute; top:6px; right:6px; display:flex; gap:6px; }
    .actions .btn{ padding:.25rem .5rem; border-radius:.35rem; border:1px solid rgba(0,0,0,.25); background:#ffffffce }

    /* űrlap + naptár */
    #calendarSection{ margin:12px 0 16px; }
    iframe{ background:#fff; border-radius:10px; }
    #formSection{ margin-top:10px; }
    form{ display:grid; gap:.6rem; }
    label{ display:grid; gap:.25rem; }
    .row{ display:grid; gap:.6rem; grid-template-columns:repeat(4,minmax(0,1fr)); }
    input,textarea{ padding:.55rem .7rem; border:1px solid var(--border); border-radius:.5rem; background:#fff; }
    textarea{ resize:vertical; min-height:84px; }
    @media (max-width:1200px){ .board{ grid-template-columns: repeat(2, minmax(280px,1fr)); } }
    @media (max-width:650px){ .board{ grid-template-columns: 1fr; } .row{ grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:520px){ .row{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>TaskManager — Kanban (COMING / ACTIVE / OVERDUE / DONE)</h1>
    <div class="inline">
      <a class="btn" href="/auth/google">Google auth</a>
      <button id="toggleCalBtn" class="btn">Calendar</button>
      <button id="newBtn" class="btn">+ New</button>
    </div>
  </header>

  <!-- GCal embed -->
  <section id="calendarSection" hidden>
    <iframe id="gcalFrame" width="100%" height="540" frameborder="0" scrolling="no"></iframe>
  </section>

  <!-- KANBAN BOARD: 4 oszlop -->
  <section id="listSection">
    <div class="board" id="board">
      <div class="col" data-status="coming">
        <div class="col-header">COMING</div>
        <div class="col-list" id="col-coming"></div>
      </div>
      <div class="col" data-status="active">
        <div class="col-header">ACTIVE</div>
        <div class="col-list" id="col-active"></div>
      </div>
      <div class="col" data-status="overdue">
        <div class="col-header">OVERDUE</div>
        <div class="col-list" id="col-overdue"></div>
      </div>
      <div class="col" data-status="done">
        <div class="col-header">DONE</div>
        <div class="col-list" id="col-done"></div>
      </div>
    </div>
  </section>

  <!-- Szerkesztő űrlap -->
  <section id="formSection" hidden>
    <h2 id="formTitle" style="margin:.25rem 0 0">New Task</h2>
    <form id="taskForm">
      <input type="hidden" name="id" />
      <label>Title <input required name="title" placeholder="Pl. Üzleti prezentáció" /></label>
      <label>Tag   <input name="tag" placeholder="pl. Work / Personal / Urgent" /></label>
      <div class="inline" style="gap:10px">
        <label class="inline" style="gap:6px"><input type="checkbox" name="allDay" id="allDayChk" /> All-day</label>
        <span class="muted">Ha nincs idő megadva, all-day esemény lesz.</span>
      </div>
      <div class="row">
        <label>Start date <input type="date" name="startDate" /></label>
        <label>Start time <input type="time" name="startTime" step="60" /></label>
        <label>End date   <input type="date" name="endDate" /></label>
        <label>End time   <input type="time" name="endTime" step="60" /></label>
      </div>
      <label>Notes <textarea name="notes" rows="4" placeholder="Jegyzet a cetlire..."></textarea></label>
      <label class="inline" style="gap:6px"><input type="checkbox" name="done" /> Kész</label>
      <div class="inline"><button class="btn" type="submit">Save</button><button class="btn" type="button" id="cancelBtn">Cancel</button></div>
    </form>
  </section>

  <!-- kliens logika -->
  <script src="app.js"></script>
</body>
</html>
